# FILE: policies.yaml
version: 1

defaults:
  decision: DENY
  reason: deny-by-default

rules:
  send_payment:
    - if: args.amount <= 5000
      then: ALLOW
      reason: within safe limit

    - if: args.amount <= 10000
      then: ESCALATE
      reason: requires human approval

    - if: args.amount > 10000
      then: DENY
      reason: amount exceeds policy limit

  delete_user:
    - then: ESCALATE
      reason: high-risk action requires approval


# FILE: mcc_policy_engine.py
#!/usr/bin/env python3
from __future__ import annotations

import asyncio
import hashlib
import hmac
import json
import logging
import uuid
from datetime import datetime, timezone
from enum import Enum
from typing import Any, Dict, Optional

import redis.asyncio as redis
import yaml
from fastapi import FastAPI, Header, HTTPException, Depends
from fastapi.responses import JSONResponse, Response
from fastapi.middleware.cors import CORSMiddleware
from prometheus_client import Counter, Histogram, generate_latest
from pydantic import BaseModel, Field
from pydantic_settings import BaseSettings


class Settings(BaseSettings):
    hmac_secret: str
    redis_url: str = "redis://localhost:6379"
    rate_limit_per_min: int = 60
    api_keys: str = "demo-key"
    policies_path: str = "policies.yaml"

    class Config:
        env_file = ".env"


settings = Settings()

logging.basicConfig(level="INFO", format="%(message)s")
logger = logging.getLogger("mcc")

DECISIONS = Counter("mcc_decisions_total", "decisions", ["decision", "intent"])
LATENCY = Histogram("mcc_latency_seconds", "latency")

redis_client: Optional[redis.Redis] = None


async def get_redis() -> redis.Redis:
    global redis_client
    if redis_client is None:
        redis_client = redis.from_url(settings.redis_url, decode_responses=True)
    return redis_client


class Decision(str, Enum):
    ALLOW = "ALLOW"
    DENY = "DENY"
    ESCALATE = "ESCALATE"


class EvaluateRequest(BaseModel):
    session_id: str = Field(..., min_length=1, max_length=128)
    intent: str = Field(..., min_length=1, max_length=128)
    args: Dict[str, Any] = Field(default_factory=dict)
    context: Dict[str, Any] = Field(default_factory=dict)
    idempotency_key: Optional[str] = Field(default=None, max_length=256)


class EvaluateResponse(BaseModel):
    decision: Decision
    trace_id: str
    reason: str
    audit_hash: str


class DotDict(dict):
    def __getattr__(self, key: str) -> Any:
        try:
            value = self[key]
            if isinstance(value, dict):
                return DotDict(value)
            return value
        except KeyError:
            raise AttributeError(key)


def get_tenant(x_api_key: str = Header(...)) -> Dict[str, str]:
    valid_keys = [k.strip() for k in settings.api_keys.split(",") if k.strip()]
    if x_api_key not in valid_keys:
        raise HTTPException(status_code=401, detail="INVALID_API_KEY")
    return {"tenant": x_api_key}


async def enforce_rate_limit(tenant: str, r: redis.Redis) -> None:
    key = f"rate:{tenant}"
    count = await r.incr(key)
    if count == 1:
        await r.expire(key, 60)
    if count > settings.rate_limit_per_min:
        raise HTTPException(status_code=429, detail="RATE_LIMIT_EXCEEDED")


class PolicyEngine:
    def __init__(self, path: str):
        with open(path, "r", encoding="utf-8") as f:
            self.config = yaml.safe_load(f) or {}

        self.defaults = self.config.get("defaults", {})
        self.rules = self.config.get("rules", {})

    def eval(self, req: EvaluateRequest) -> tuple[Decision, str]:
        intent_rules = self.rules.get(req.intent, [])

        safe_args = DotDict(req.args)
        safe_context = DotDict(req.context)

        for rule in intent_rules:
            condition = rule.get("if")

            if condition:
                try:
                    passed = eval(
                        condition,
                        {"__builtins__": {}},
                        {
                            "args": safe_args,
                            "context": safe_context,
                        },
                    )
                except Exception:
                    continue

                if passed:
                    return Decision(rule["then"]), rule.get("reason", "policy matched")

            else:
                return Decision(rule["then"]), rule.get("reason", "policy matched")

        return (
            Decision(self.defaults.get("decision", "DENY")),
            self.defaults.get("reason", "deny-by-default"),
        )


policy_engine = PolicyEngine(settings.policies_path)


class MCC:
    def __init__(self):
        self.prev_hash = "GENESIS"
        self._lock = asyncio.Lock()

    def _trace(self, session_id: str) -> str:
        raw = f"{session_id}:{uuid.uuid4()}"
        return hashlib.sha256(raw.encode()).hexdigest()[:12]

    async def evaluate(
        self,
        tenant: str,
        req: EvaluateRequest,
        r: redis.Redis,
    ) -> EvaluateResponse:
        trace_id = self._trace(req.session_id)

        if req.idempotency_key:
            idem_key = f"idem:{tenant}:{req.idempotency_key}"
            cached = await r.get(idem_key)
            if cached:
                return EvaluateResponse.model_validate_json(cached)

        decision, reason = policy_engine.eval(req)

        async with self._lock:
            audit_payload = {
                "ts": datetime.now(timezone.utc).isoformat(),
                "tenant": tenant,
                "trace_id": trace_id,
                "decision": decision.value,
                "intent": req.intent,
                "args": req.args,
                "context": req.context,
                "prev_hash": self.prev_hash,
            }

            curr_hash = hashlib.sha256(
                json.dumps(
                    audit_payload,
                    sort_keys=True,
                    separators=(",", ":"),
                ).encode()
            ).hexdigest()

            self.prev_hash = curr_hash

        result = EvaluateResponse(
            decision=decision,
            trace_id=trace_id,
            reason=reason,
            audit_hash=curr_hash,
        )

        if req.idempotency_key:
            idem_key = f"idem:{tenant}:{req.idempotency_key}"
            await r.setex(idem_key, 86400, result.model_dump_json())

        DECISIONS.labels(decision=decision.value, intent=req.intent).inc()

        logger.info(json.dumps({
            "trace_id": trace_id,
            "tenant": tenant,
            "decision": decision.value,
            "intent": req.intent,
            "reason": reason,
            "audit_hash": curr_hash,
        }))

        return result


mcc = MCC()

app = FastAPI(title="MCC Policy Engine", version="2.0")

app.add_middleware(
    CORSMiddleware,
    allow_origins=["*"],
    allow_methods=["*"],
    allow_headers=["*"],
)


@app.post("/evaluate")
async def evaluate(
    req: EvaluateRequest,
    tenant_ctx: Dict[str, str] = Depends(get_tenant),
    r: redis.Redis = Depends(get_redis),
):
    tenant = tenant_ctx["tenant"]

    await enforce_rate_limit(tenant, r)

    with LATENCY.time():
        result = await mcc.evaluate(tenant, req, r)

    body = result.model_dump_json().encode()
    sig = hmac.new(settings.hmac_secret.encode(), body, hashlib.sha256).hexdigest()

    return JSONResponse(
        content=result.model_dump(),
        headers={"X-MCC-Signature": sig},
    )


@app.get("/health")
async def health():
    return {"status": "ok"}


@app.get("/metrics")
async def metrics():
    return Response(content=generate_latest(), media_type="text/plain")


if __name__ == "__main__":
    import uvicorn

    uvicorn.run(app, host="0.0.0.0", port=8000)
