version: 1

defaults:
  decision: DENY
  reason: deny-by-default

rules:
  send_payment:
    - if: args.amount <= 5000
      then: ALLOW
      reason: within safe limit

    - if: args.amount <= 10000
      then: ESCALATE
      reason: requires human approval

    - if: args.amount > 10000
      then: DENY
      reason: amount exceeds policy limit

  delete_user:
    - then: ESCALATE
      reason: high-risk action requires approval
